# An engine is a declared cyclic lifecycle of fact kinds, with skill hooks.
# The git adapter (auto-runner.mjs) reads this file and runs the matching
# skill via the declared agent when a trigger fact lands in the fact log.
name: pr-greeter
description: Greet every PR author. First-timers get a warm welcome; returning contributors get a short ack.

on:
  kind: PROpened
  steps:
    - id: greet-first-time
      when: "count(facts where kind == 'Greeted' and payload.author == $event.author) == 0"
      skill: welcome-new-contributor
      agent: deterministic-local
      with:
        author: $event.author
        pr_number: $event.pr_number
    - id: greet-returning
      when: "count(facts where kind == 'Greeted' and payload.author == $event.author) > 0"
      skill: welcome-back-contributor
      agent: deterministic-local
      with:
        author: $event.author
        pr_number: $event.pr_number
        prior_count: "count(facts where kind == 'Greeted' and payload.author == $event.author)"
